services:
  - type: web
    name: drop-backend
    env: node
    region: oregon
    plan: free
    rootDir: .
    # --include=dev é necessário: o build (tsc) precisa de typescript e @types,
    # que são devDependencies (NODE_ENV=production as omitiria por padrão).
    buildCommand: npm install --include=dev --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: LOG_LEVEL
        value: info
